
<style>
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState} = React;

const T = M => M[0].map((_,j)=>M.map(r=>r[j]));
const mm = (A,B) => A.map(r=>B[0].map((_,j)=>r.reduce((s,v,k)=>s+v*B[k][j],0)));
const inv = M => {
  const n=M.length;
  const a=M.map((row,i)=>[...row,...Array.from({length:n},(_,j)=>+(i===j))]);
  for(let c=0;c<n;c++){
    let mx=c;
    for(let r=c+1;r<n;r++)if(Math.abs(a[r][c])>Math.abs(a[mx][c]))mx=r;
    [a[c],a[mx]]=[a[mx],a[c]];
    const p=a[c][c];
    if(Math.abs(p)<1e-10)return null;
    a[c]=a[c].map(v=>v/p);
    for(let r=0;r<n;r++){if(r===c)continue;const f=a[r][c];a[r]=a[r].map((v,j)=>v-f*a[c][j]);}
  }
  return a.map(r=>r.slice(n));
};

const trainModel = recs => {
  if(recs.length<7)return null;
  const X=recs.map(r=>[1,r.area/1000,r.bedrooms,r.bathrooms,r.location,r.age]);
  const y=recs.map(r=>[r.price]);
  const Xt=T(X); const I=inv(mm(Xt,X));
  if(!I)return null;
  const theta=mm(mm(I,Xt),y).map(r=>r[0]);
  const yMean=y.reduce((s,v)=>s+v[0],0)/y.length;
  const ypred=X.map(row=>row.reduce((s,x,i)=>s+x*theta[i],0));
  const ssTot=y.reduce((s,v)=>s+(v[0]-yMean)**2,0);
  const ssRes=y.reduce((s,v,i)=>s+(v[0]-ypred[i])**2,0);
  return{theta,r2:1-ssRes/ssTot,rmse:Math.sqrt(ssRes/y.length),ypred:ypred.map(v=>+v.toFixed(1))};
};

const predictPrice=(theta,{area,bedrooms,bathrooms,location,age})=>
  [1,area/1000,bedrooms,bathrooms,location,age].reduce((s,x,i)=>s+x*theta[i],0);

let nextId=16;
const SEED=[
  {id:1,area:850,bedrooms:2,bathrooms:1,location:5,age:12,price:38},
  {id:2,area:1200,bedrooms:3,bathrooms:2,location:6,age:8,price:58},
  {id:3,area:1600,bedrooms:3,bathrooms:2,location:7,age:5,price:82},
  {id:4,area:2000,bedrooms:4,bathrooms:3,location:8,age:3,price:115},
  {id:5,area:900,bedrooms:2,bathrooms:1,location:4,age:18,price:32},
  {id:6,area:1400,bedrooms:3,bathrooms:2,location:6,age:10,price:65},
  {id:7,area:2500,bedrooms:4,bathrooms:3,location:9,age:2,price:155},
  {id:8,area:750,bedrooms:2,bathrooms:1,location:5,age:20,price:28},
  {id:9,area:1800,bedrooms:4,bathrooms:2,location:7,age:6,price:98},
  {id:10,area:3000,bedrooms:5,bathrooms:4,location:9,age:1,price:210},
  {id:11,area:1100,bedrooms:2,bathrooms:2,location:6,age:9,price:52},
  {id:12,area:1350,bedrooms:3,bathrooms:2,location:7,age:7,price:70},
  {id:13,area:2200,bedrooms:4,bathrooms:3,location:8,age:4,price:128},
  {id:14,area:600,bedrooms:1,bathrooms:1,location:4,age:25,price:18},
  {id:15,area:1700,bedrooms:3,bathrooms:2,location:7,age:6,price:88},
];
const BLANK={area:"",bedrooms:"",bathrooms:"",location:"",age:"",price:""};
const FEAT_NAMES=["Intercept","Area (per 1000 sq.ft)","Bedrooms","Bathrooms","Location score","Age (years)"];
const FEAT_BARS=["#888780","#185FA5","#0F6E56","#BA7517","#534AB7","#993C1D"];

const MetricCard=({label,value,icon,color})=>React.createElement("div",{style:{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"1rem"}},
  React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:6}},
    React.createElement("i",{className:`ti ${icon}`,style:{fontSize:16,color},"aria-hidden":"true"}),
    React.createElement("span",{style:{fontSize:12,color:"var(--color-text-secondary)"}},label)
  ),
  React.createElement("div",{style:{fontSize:22,fontWeight:500,fontFamily:"var(--font-mono)",color:"var(--color-text-primary)"}},value)
);

function App(){
  const [records,setRecords]=useState(SEED);
  const [model,setModel]=useState(null);
  const [tab,setTab]=useState("data");
  const [form,setForm]=useState(BLANK);
  const [editId,setEditId]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [pred,setPred]=useState(null);
  const [predIn,setPredIn]=useState({area:1500,bedrooms:3,bathrooms:2,location:7,age:5});
  const [trainErr,setTrainErr]=useState("");

  const openCreate=()=>{setForm(BLANK);setEditId(null);setShowForm(true);};
  const openEdit=r=>{setForm({area:r.area,bedrooms:r.bedrooms,bathrooms:r.bathrooms,location:r.location,age:r.age,price:r.price});setEditId(r.id);setShowForm(true);};
  const cancelForm=()=>{setShowForm(false);setEditId(null);};
  const saveRecord=()=>{
    const entry=Object.fromEntries(Object.entries(form).map(([k,v])=>[k,+v]));
    if(editId)setRecords(rs=>rs.map(r=>r.id===editId?{...r,...entry}:r));
    else setRecords(rs=>[...rs,{id:nextId++,...entry}]);
    setShowForm(false);setEditId(null);setModel(null);setPred(null);
  };
  const deleteRecord=id=>{setRecords(rs=>rs.filter(r=>r.id!==id));setModel(null);setPred(null);};
  const formValid=Object.values(form).every(v=>v!==""&&!isNaN(Number(v))&&Number(v)>=0);
  const handleTrain=()=>{const m=trainModel(records);if(m){setModel(m);setTrainErr("");}else setTrainErr(`At least 7 records required (have ${records.length}).`);};
  const handlePredict=()=>{if(model)setPred(predictPrice(model.theta,predIn));};

  const tdS={padding:"9px 12px",borderTop:"0.5px solid var(--color-border-tertiary)"};
  const monoS={fontFamily:"var(--font-mono)",fontSize:13};
  const tabBtn=(t,icon,label)=>React.createElement("button",{key:t,onClick:()=>setTab(t),style:{display:"flex",alignItems:"center",gap:6,padding:"10px 18px",fontSize:13,fontWeight:tab===t?500:400,color:tab===t?"var(--color-text-primary)":"var(--color-text-secondary)",background:"none",border:"none",borderBottom:tab===t?"2px solid var(--color-text-primary)":"2px solid transparent",cursor:"pointer",fontFamily:"var(--font-sans)"}},
    React.createElement("i",{className:`ti ${icon}`,style:{fontSize:15},"aria-hidden":"true"}),label);

  const e=React.createElement;

  return e("div",{style:{padding:"1rem 0"}},
    e("h2",{className:"sr-only"},"ML house price predictor — CRUD database with linear regression"),

    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:"1.5rem"}},
      e(MetricCard,{label:"Records",value:records.length,icon:"ti-database",color:"var(--color-text-info)"}),
      e(MetricCard,{label:"Model",value:model?"Trained":"Untrained",icon:"ti-brain",color:model?"var(--color-text-success)":"var(--color-text-tertiary)"}),
      e(MetricCard,{label:"R² score",value:model?(model.r2*100).toFixed(1)+"%":"—",icon:"ti-chart-line",color:model&&model.r2>0.9?"var(--color-text-success)":"var(--color-text-tertiary)"}),
      e(MetricCard,{label:"Last prediction",value:pred!==null?"₹"+Math.max(0,pred).toFixed(1)+"L":"—",icon:"ti-home",color:pred!==null?"var(--color-text-warning)":"var(--color-text-tertiary)"})
    ),

    e("div",{style:{display:"flex",borderBottom:"0.5px solid var(--color-border-tertiary)",marginBottom:"1.5rem"}},
      tabBtn("data","ti-table","Data / CRUD"),
      tabBtn("model","ti-cpu","Model"),
      tabBtn("predict","ti-wand","Predict")
    ),

    tab==="data"&&e("div",null,
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}},
        e("span",{style:{fontSize:13,color:"var(--color-text-secondary)"}},`House property records · ${records.length} entries`),
        e("button",{onClick:openCreate,style:{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",fontSize:13,fontWeight:500,background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",cursor:"pointer",color:"var(--color-text-primary)"}},
          e("i",{className:"ti ti-plus",style:{fontSize:16},"aria-hidden":"true"})," Add record")
      ),
      showForm&&e("div",{style:{background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-lg)",padding:"1rem 1.25rem",marginBottom:"1rem"}},
        e("p",{style:{margin:"0 0 0.75rem",fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}},
          e("i",{className:`ti ${editId?"ti-edit":"ti-plus"}`,style:{fontSize:16,marginRight:6,verticalAlign:"-2px"},"aria-hidden":"true"}),
          editId?`Editing record #${editId}`:"New property record"
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:12}},
          ...[["area","Area (sq.ft)"],["bedrooms","Bedrooms"],["bathrooms","Bathrooms"],["location","Location (1–10)"],["age","Age (years)"],["price","Price (₹ lakhs)"]].map(([key,label])=>
            e("div",{key},
              e("label",{style:{display:"block",fontSize:11,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}},label),
              e("input",{type:"number",min:"0",value:form[key],onChange:ev=>setForm(f=>({...f,[key]:ev.target.value})),placeholder:"0",style:{width:"100%",fontFamily:"var(--font-mono)",fontSize:13}})
            )
          )
        ),
        e("div",{style:{display:"flex",gap:8,marginTop:"0.75rem"}},
          e("button",{onClick:saveRecord,disabled:!formValid,style:{padding:"8px 18px",fontSize:13,fontWeight:500,background:formValid?"var(--color-text-primary)":"var(--color-background-tertiary)",color:formValid?"var(--color-background-primary)":"var(--color-text-tertiary)",border:"none",borderRadius:"var(--border-radius-md)",cursor:formValid?"pointer":"not-allowed"}},editId?"Update":"Create"),
          e("button",{onClick:cancelForm,style:{padding:"8px 18px",fontSize:13,background:"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",cursor:"pointer",color:"var(--color-text-secondary)"}},"Cancel")
        )
      ),
      e("div",{style:{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",overflow:"hidden"}},
        e("div",{style:{overflowX:"auto"}},
          e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
            e("thead",null,e("tr",{style:{background:"var(--color-background-secondary)"}},
              ...["#","Area","Beds","Baths","Location","Age","Price (₹L)",""].map(h=>
                e("th",{key:h,style:{padding:"10px 12px",textAlign:"left",fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",color:"var(--color-text-secondary)",fontWeight:500,borderBottom:"0.5px solid var(--color-border-tertiary)"}},h))
            )),
            e("tbody",null,...records.map(r=>
              e("tr",{key:r.id,style:{background:editId===r.id?"var(--color-background-info)":"transparent"}},
                e("td",{style:{...tdS,...monoS,color:"var(--color-text-tertiary)",fontSize:12}},r.id),
                e("td",{style:{...tdS,...monoS}},r.area.toLocaleString()),
                e("td",{style:{...tdS,...monoS}},r.bedrooms),
                e("td",{style:{...tdS,...monoS}},r.bathrooms),
                e("td",{style:tdS},e("span",{style:{...monoS,fontWeight:500,color:r.location>=8?"var(--color-text-success)":r.location>=6?"var(--color-text-warning)":"var(--color-text-secondary)"}},r.location+"/10")),
                e("td",{style:{...tdS,...monoS}},r.age+"y"),
                e("td",{style:{...tdS,...monoS,fontWeight:500,color:"var(--color-text-warning)"}},"₹"+r.price+"L"),
                e("td",{style:{...tdS,whiteSpace:"nowrap"}},
                  e("button",{onClick:()=>openEdit(r),"aria-label":`Edit record ${r.id}`,style:{padding:"4px 10px",fontSize:13,background:"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:6,cursor:"pointer",marginRight:6,color:"var(--color-text-secondary)"}},e("i",{className:"ti ti-edit",style:{fontSize:14},"aria-hidden":"true"})),
                  e("button",{onClick:()=>deleteRecord(r.id),"aria-label":`Delete record ${r.id}`,style:{padding:"4px 10px",fontSize:13,background:"none",border:"0.5px solid var(--color-border-danger)",borderRadius:6,cursor:"pointer",color:"var(--color-text-danger)"}},e("i",{className:"ti ti-trash",style:{fontSize:14},"aria-hidden":"true"}))
                )
              )
            ))
          )
        )
      ),
      e("p",{style:{fontSize:12,color:"var(--color-text-tertiary)",marginTop:8}},"Location score: 1 = outskirts, 10 = prime area · Prices in Indian rupees (lakhs)")
    ),

    tab==="model"&&e("div",{style:{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:"1.25rem"}},
      e("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:"1rem",flexWrap:"wrap"}},
        e("div",null,
          e("h3",{style:{margin:0,fontSize:16,fontWeight:500}},"Multiple linear regression"),
          e("p",{style:{margin:"4px 0 0",fontSize:13,color:"var(--color-text-secondary)"}},"Normal equation · θ = (XᵀX)⁻¹Xᵀy · "+records.length+" training samples")
        ),
        e("button",{onClick:handleTrain,style:{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",fontSize:13,fontWeight:500,background:"var(--color-text-primary)",color:"var(--color-background-primary)",border:"none",borderRadius:"var(--border-radius-md)",cursor:"pointer",flexShrink:0}},
          e("i",{className:"ti ti-player-play",style:{fontSize:16},"aria-hidden":"true"})," Train model")
      ),
      trainErr&&e("div",{style:{padding:"10px 14px",background:"var(--color-background-danger)",border:"0.5px solid var(--color-border-danger)",borderRadius:"var(--border-radius-md)",fontSize:13,color:"var(--color-text-danger)",marginBottom:"1rem"}},
        e("i",{className:"ti ti-alert-triangle",style:{fontSize:16,marginRight:6,verticalAlign:"-2px"},"aria-hidden":"true"}),trainErr),
      !model&&!trainErr&&e("div",{style:{textAlign:"center",padding:"3rem 0",color:"var(--color-text-tertiary)",fontSize:13}},
        e("i",{className:"ti ti-brain",style:{fontSize:40,display:"block",marginBottom:12},"aria-hidden":"true"}),
        `Click "Train model" to fit the regression on your ${records.length} records.`
      ),
      model&&e("div",null,
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:"1.5rem"}},
          ...[["R² score",(model.r2*100).toFixed(2)+"%",model.r2>0.9?"var(--color-text-success)":"var(--color-text-warning)"],
              ["RMSE","₹"+model.rmse.toFixed(2)+"L","var(--color-text-primary)"],
              ["Samples",""+records.length,"var(--color-text-primary)"],
              ["Features","5","var(--color-text-primary)"]].map(([label,value,color])=>
            e("div",{key:label,style:{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"0.875rem"}},
              e("div",{style:{fontSize:12,color:"var(--color-text-secondary)",marginBottom:4}},label),
              e("div",{style:{fontSize:20,fontWeight:500,fontFamily:"var(--font-mono)",color}},value)
            )
          )
        ),
        e("div",{style:{marginBottom:4,display:"flex",justifyContent:"space-between"}},
          e("span",{style:{fontSize:12,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.06em"}},"R² goodness of fit"),
          e("span",{style:{fontSize:12,fontFamily:"var(--font-mono)",color:"var(--color-text-secondary)"}},(model.r2*100).toFixed(1)+"%")
        ),
        e("div",{style:{height:6,background:"var(--color-background-tertiary)",borderRadius:3,marginBottom:"1.5rem"}},
          e("div",{style:{height:"100%",background:model.r2>0.9?"#1D9E75":"#EF9F27",width:(model.r2*100)+"%",borderRadius:3}})
        ),
        e("div",{style:{fontSize:13,fontWeight:500,marginBottom:"0.75rem",color:"var(--color-text-primary)"}},"Learned coefficients (θ)"),
        ...model.theta.map((v,i)=>{
          const maxAbs=Math.max(...model.theta.map(Math.abs));
          const pct=(Math.abs(v)/maxAbs)*80;
          return e("div",{key:i,style:{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderTop:"0.5px solid var(--color-border-tertiary)"}},
            e("span",{style:{width:180,fontSize:12,color:"var(--color-text-secondary)",flexShrink:0}},FEAT_NAMES[i]),
            e("div",{style:{flex:1,height:4,background:"var(--color-background-tertiary)",borderRadius:2}},
              e("div",{style:{height:"100%",background:FEAT_BARS[i],width:pct+"%",borderRadius:2}})
            ),
            e("span",{style:{fontSize:13,fontFamily:"var(--font-mono)",fontWeight:500,color:v>0?"var(--color-text-success)":"var(--color-text-danger)",minWidth:70,textAlign:"right"}},(v>0?"+":"")+v.toFixed(3))
          );
        }),
        e("div",{style:{marginTop:"1.25rem",background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"0.875rem",fontSize:11,fontFamily:"var(--font-mono)",color:"var(--color-text-secondary)",lineHeight:1.8,wordBreak:"break-word"}},
          e("span",{style:{color:"var(--color-text-tertiary)"}},"price = "),
          model.theta[0].toFixed(2)+" + "+model.theta[1].toFixed(3)+"·(area/1000) "+(model.theta[2]>=0?"+":"")+model.theta[2].toFixed(3)+"·beds "+(model.theta[3]>=0?"+":"")+model.theta[3].toFixed(3)+"·baths "+(model.theta[4]>=0?"+":"")+model.theta[4].toFixed(3)+"·loc "+(model.theta[5]>=0?"+":"")+model.theta[5].toFixed(3)+"·age"
        )
      )
    ),

    tab==="predict"&&e("div",null,
      !model&&e("div",{style:{padding:"0.875rem 1rem",background:"var(--color-background-warning)",border:"0.5px solid var(--color-border-warning)",borderRadius:"var(--border-radius-md)",marginBottom:"1rem",fontSize:13,color:"var(--color-text-warning)",display:"flex",alignItems:"center",gap:8}},
        e("i",{className:"ti ti-alert-triangle",style:{fontSize:16},"aria-hidden":"true"}),"Train the model first (go to the Model tab)."),
      e("div",{style:{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr)",gap:"1.25rem"}},
        e("div",{style:{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:"1.25rem"}},
          e("h3",{style:{margin:"0 0 1rem",fontSize:15,fontWeight:500}},"Property features"),
          ...[["area","Area (sq.ft)",200,5000,50],["bedrooms","Bedrooms",1,7,1],["bathrooms","Bathrooms",1,5,1],["location","Location score (1–10)",1,10,1],["age","Age (years)",0,40,1]].map(([key,label,min,max,step])=>
            e("div",{key,style:{marginBottom:"0.875rem"}},
              e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                e("label",{style:{fontSize:12,color:"var(--color-text-secondary)"}},label),
                e("span",{style:{fontSize:13,fontWeight:500,fontFamily:"var(--font-mono)",color:"var(--color-text-primary)"}},predIn[key])
              ),
              e("input",{type:"range",min,max,step,value:predIn[key],onChange:ev=>{setPredIn(p=>({...p,[key]:+ev.target.value}));setPred(null);},style:{width:"100%"}})
            )
          ),
          e("button",{onClick:handlePredict,disabled:!model,style:{width:"100%",marginTop:"0.5rem",padding:"10px",fontSize:13,fontWeight:500,background:model?"var(--color-text-primary)":"var(--color-background-secondary)",color:model?"var(--color-background-primary)":"var(--color-text-tertiary)",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",cursor:model?"pointer":"not-allowed"}},
            e("i",{className:"ti ti-calculator",style:{fontSize:15,marginRight:6,verticalAlign:"-2px"},"aria-hidden":"true"}),"Predict price")
        ),
        e("div",{style:{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:"1.25rem",display:"flex",flexDirection:"column"}},
          e("h3",{style:{margin:"0 0 0.75rem",fontSize:15,fontWeight:500}},"Estimated price"),
          pred!==null
            ?e("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:"1.5rem 0"}},
                e("span",{style:{fontSize:11,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.08em"}},"Predicted market value"),
                e("div",{style:{fontSize:44,fontWeight:500,fontFamily:"var(--font-mono)",color:"var(--color-text-warning)",lineHeight:1.1}},"₹"+Math.max(0,pred).toFixed(1)+"L"),
                e("div",{style:{fontSize:15,color:"var(--color-text-secondary)",marginBottom:"1rem"}},"≈ ₹"+(Math.max(0,pred)/100).toFixed(3)+" Cr"),
                e("div",{style:{width:"100%",background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"0.75rem 1rem"}},
                  e("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}},"Input summary"),
                  e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px"}},
                    ...[["Area",predIn.area+" sq.ft"],["Bedrooms",predIn.bedrooms],["Bathrooms",predIn.bathrooms],["Location",predIn.location+"/10"],["Age",predIn.age+" yrs"]].map(([k,v])=>
                      e("div",{key:k,style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"2px 0"}},
                        e("span",{style:{color:"var(--color-text-secondary)"}},k),
                        e("span",{style:{fontFamily:"var(--font-mono)",fontWeight:500,color:"var(--color-text-primary)"}},v)
                      )
                    )
                  )
                )
              )
